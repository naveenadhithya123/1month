services:
  - type: web
    name: invoice-reconciliation-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_CHAT_MODEL
        value: openai/gpt-oss-120b
      - key: OCR_SPACE_API_KEY
        value: helloworld
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Invoice Reconciliation AI

  - type: web
    name: invoice-reconciliation-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_APP_NAME
        value: Invoice Reconciliation AI
      - key: VITE_API_URL
        sync: false
